version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: cache_demo_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: cache_demo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cache_demo"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ../..
      dockerfile: examples/web_demo/Dockerfile
    container_name: cache_demo_web
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:secretpassword@db:5432/cache_demo
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
