version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: cache_benchmark_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: benchmark_db
    ports:
      - "5432:5432"
    volumes:
      - pg_benchmark_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d benchmark_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8.0-alpine
    container_name: cache_benchmark_valkey
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  benchmark:
    build:
      context: ../..
      dockerfile: examples/benchmark/Dockerfile
    container_name: cache_benchmark_web
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:secretpassword@db:5432/benchmark_db
      - VALKEY_URL=redis://valkey:6379/0
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy

volumes:
  pg_benchmark_data:
