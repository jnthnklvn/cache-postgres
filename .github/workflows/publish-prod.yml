name: Publish to PyPI (Production)

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    # Restrict to master branch releases or manual dispatch on master branch
    if: >-
      (github.event_name == 'release' && (github.event.release.target_commitish == 'master' || github.event.release.target_commitish == 'refs/heads/master')) ||
      (github.event_name == 'workflow_dispatch' && github.ref_name == 'master')

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Build package
      run: python -m build

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

  publish-to-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/cache-postgres

    permissions:
      id-token: write  # MANDATORY for OIDC Trusted Publishing

    steps:
    - name: Download distribution artifact
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
