name: Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: secretpassword
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov coverage-badge psycopg[pool] anyio
          pip install -e .

      - name: Run tests with coverage
        env:
          PGCACHE_TEST_DSN: postgresql://postgres:secretpassword@127.0.0.1:5432/postgres
        run: |
          pytest --cov=cache_postgres --cov-report=term-missing tests/

      - name: Generate Coverage Badge
        if: github.ref == 'refs/heads/master' && matrix.python-version == '3.11'
        run: |
          mkdir -p .github/badges
          coverage-badge -o .github/badges/coverage.svg -f

      - name: Commit Coverage Badge
        if: github.ref == 'refs/heads/master' && matrix.python-version == '3.11'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update test coverage badge [skip ci]"
          file_pattern: ".github/badges/coverage.svg"
